<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Cost Calculator - See What You're Losing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #2C0D28;
            color: #1E0E1C;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #F9F0F7;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: -8px 8px #1A081A;
        }

        .header {
            background: #2C0D28;
            border-top: 8px solid #EDD9E8;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            color: #F9F0F7;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .header p {
            color: #EDD9E8;
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .content {
            padding: 40px 30px;
        }

        .form-container {
            background: #FAF7F9;
            padding: 30px;
            border-radius: 6px;
            border-left: 4px solid #6B2E60;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #1E0E1C;
            margin-bottom: 8px;
            font-size: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E8E2E7;
            border-radius: 6px;
            font-family: inherit;
            font-size: 15px;
            color: #1E0E1C;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6B2E60;
            background: #FAF7F9;
        }

        .input-with-unit {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-with-unit input {
            flex: 1;
        }

        .unit {
            font-weight: 600;
            color: #5A4F58;
            padding-bottom: 12px;
        }

        .hidden {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4A1942;
            color: #F9F0F7;
        }

        .btn-primary:hover {
            background: #2C0D28;
        }

        .result {
            background: #FAF7F9;
            padding: 40px;
            border-radius: 6px;
            border-left: 4px solid #C4603A;
        }

        .result h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: #2C0D28;
            margin-bottom: 30px;
        }

        .cost-card {
            background: #2C0D28;
            color: #F9F0F7;
            padding: 25px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-top: 6px solid #EDD9E8;
        }

        .cost-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .cost-amount {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            color: #EDD9E8;
            margin-bottom: 5px;
        }

        .cost-description {
            font-size: 13px;
            opacity: 0.8;
        }

        .total-cost {
            background: #C4603A;
            color: #F9F0F7;
            padding: 30px;
            border-radius: 6px;
            margin: 30px 0;
            text-align: center;
        }

        .total-cost h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            opacity: 0.95;
        }

        .total-amount {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .total-subtext {
            font-size: 14px;
            opacity: 0.9;
        }

        .insights {
            background: #EDD9E8;
            padding: 25px;
            border-radius: 6px;
            margin: 30px 0;
        }

        .insights h3 {
            font-weight: 700;
            color: #2C0D28;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .insight-item {
            margin-bottom: 12px;
            color: #1E0E1C;
            font-size: 15px;
            line-height: 1.6;
        }

        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .comparison-item {
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #6B2E60;
        }

        .comparison-item h4 {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .comparison-item ul {
            list-style: none;
            margin-left: 0;
        }

        .comparison-item li {
            padding: 5px 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .comparison-item li:before {
            content: "→ ";
            font-weight: 600;
            color: #6B2E60;
        }

        .cta-box {
            background: #2C0D28;
            color: #F9F0F7;
            padding: 30px;
            border-radius: 6px;
            text-align: center;
            margin-top: 30px;
        }

        .cta-box h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .cta-box p {
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
        }

        .email-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .email-input-group input {
            flex: 1;
            background: #F9F0F7;
            color: #1E0E1C;
        }

        .email-input-group button {
            flex: 0 0 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>What's Your Admin Actually Costing You?</h1>
            <p>Find out how much revenue you're bleeding to broken systems.</p>
        </div>

        <div class="content">
            <div id="formSection" class="form-container">
                <div class="form-group">
                    <label for="role">What's your role?</label>
                    <select id="role">
                        <option value="">Select your role...</option>
                        <option value="coach">Coach or Consultant</option>
                        <option value="trainer">Trainer or Fitness Professional</option>
                        <option value="freelancer">Freelancer or Agency Owner</option>
                        <option value="ecom">E-Commerce or Product Creator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="adminHours">How many hours per week on admin?</label>
                    <div class="input-with-unit">
                        <input type="number" id="adminHours" placeholder="e.g., 15" min="0">
                        <div class="unit">hrs/week</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="hourlyRate">What's your hourly rate?</label>
                    <div class="input-with-unit">
                        <input type="number" id="hourlyRate" placeholder="e.g., 150" min="0">
                        <div class="unit">$/hr</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="leadsPerMonth">How many leads/prospects per month?</label>
                    <div class="input-with-unit">
                        <input type="number" id="leadsPerMonth" placeholder="e.g., 10" min="0">
                        <div class="unit">leads</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="conversionRate">Conversion rate (%)?</label>
                    <div class="input-with-unit">
                        <input type="number" id="conversionRate" placeholder="e.g., 30" min="0" max="100">
                        <div class="unit">%</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="avgValue">Average deal value?</label>
                    <div class="input-with-unit">
                        <input type="number" id="avgValue" placeholder="e.g., 2000" min="0">
                        <div class="unit">$</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Your email</label>
                    <input type="email" id="email" placeholder="you@email.com">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="calculateCost()">Calculate My Cost</button>
                </div>
            </div>

            <div id="resultSection" class="hidden">
                <div class="result">
                    <h2>Here's What Your Systems Are Actually Costing You</h2>
                    <div id="resultContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateCost() {
            const role = document.getElementById('role').value;
            const adminHours = parseFloat(document.getElementById('adminHours').value);
            const hourlyRate = parseFloat(document.getElementById('hourlyRate').value);
            const leadsPerMonth = parseFloat(document.getElementById('leadsPerMonth').value);
            const conversionRate = parseFloat(document.getElementById('conversionRate').value);
            const avgValue = parseFloat(document.getElementById('avgValue').value);
            const email = document.getElementById('email').value;

            if (!role || !adminHours || !hourlyRate || !leadsPerMonth || !conversionRate || !avgValue || !email) {
                alert('Please fill in all fields');
                return;
            }

            // Calculate costs
            const annualAdminCost = adminHours * 52 * hourlyRate;
            const leadsPerYear = leadsPerMonth * 12;
            const expectedConversions = leadsPerYear * (conversionRate / 100);
            
            // Estimate lost conversions (20% slip due to poor follow-up)
            const slipRate = 0.20;
            const lostDealsFromSlip = Math.floor(expectedConversions * slipRate);
            const lostRevenueFromSlip = lostDealsFromSlip * avgValue;
            
            const totalAnnualCost = annualAdminCost + lostRevenueFromSlip;

            // Send to Formspree
            const formData = {
                email: email,
                role: role,
                adminHours: adminHours,
                hourlyRate: hourlyRate,
                leadsPerMonth: leadsPerMonth,
                conversionRate: conversionRate,
                avgValue: avgValue,
                annualAdminCost: annualAdminCost,
                lostRevenueFromSlip: lostRevenueFromSlip,
                totalAnnualCost: totalAnnualCost
            };

            // Post to Formspree
            const formDataToSend = new FormData();

        formDataToSend.append("email", email);
        formDataToSend.append("role", role);
        formDataToSend.append("adminHours", adminHours);
        formDataToSend.append("hourlyRate", hourlyRate);
        formDataToSend.append("leadsPerMonth", leadsPerMonth);
        formDataToSend.append("conversionRate", conversionRate);
        formDataToSend.append("avgValue", avgValue);
        formDataToSend.append("annualAdminCost", annualAdminCost);
        formDataToSend.append("lostRevenueFromSlip", lostRevenueFromSlip);
        formDataToSend.append("totalAnnualCost", totalAnnualCost);
        
        fetch('https://formspree.io/f/mlgzrqrv', {
            method: 'POST',
            body: formDataToSend,
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(() => {
            showResults(email, annualAdminCost, lostDealsFromSlip, lostRevenueFromSlip, totalAnnualCost, avgValue);
        })
       .catch(() => {
    showResults(
        email,
        annualAdminCost,
        lostDealsFromSlip,
        lostRevenueFromSlip,
        totalAnnualCost,
        avgValue
    );
});
}
    

        function showResults(email, annualAdminCost, lostDealsFromSlip, lostRevenueFromSlip, totalAnnualCost, avgValue) {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = `
                <div class="cost-card">
                    <h3>Time Spent on Admin</h3>
                    <div class="cost-amount">$${annualAdminCost.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="cost-description">per year</div>
                </div>

                <div class="cost-card">
                    <h3>Revenue Lost to Poor Follow-Up</h3>
                    <div class="cost-amount">$${lostRevenueFromSlip.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="cost-description">~${lostDealsFromSlip} deals slip per year</div>
                </div>

                <div class="total-cost">
                    <h3>Total Annual Cost</h3>
                    <div class="total-amount">$${totalAnnualCost.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="total-subtext">That's ${(totalAnnualCost / 12).toLocaleString('en-US', {maximumFractionDigits: 0})} per month</div>
                </div>

                <div class="insights">
                    <h3>What This Means</h3>
                    <div class="insight-item">
                        You're spending roughly <strong>${annualAdminCost.toLocaleString('en-US', {maximumFractionDigits: 0})}</strong> per year on admin work that could be automated.
                    </div>
                    <div class="insight-item">
                        You're losing <strong>~${lostDealsFromSlip} deals per year</strong> because leads go cold without follow-up. That's <strong>$${lostRevenueFromSlip.toLocaleString('en-US', {maximumFractionDigits: 0})}</strong> walking out the door.
                    </div>
                    <div class="insight-item">
                        <strong>Combined:</strong> You're losing <strong>$${totalAnnualCost.toLocaleString('en-US', {maximumFractionDigits: 0})}</strong> per year to broken systems.
                    </div>
                </div>

                <div class="comparison">
                    <div class="comparison-item">
                        <h4>What You're Doing Now</h4>
                        <ul>
                            <li>Tracking across multiple tools</li>
                            <li>Remembering who to follow up with</li>
                            <li>Losing leads to silence</li>
                            <li>Constantly stressed</li>
                        </ul>
                    </div>
                    <div class="comparison-item">
                        <h4>With A Working System</h4>
                        <ul>
                            <li>Everything in one place</li>
                            <li>Automatic follow-up reminders</li>
                            <li>Nothing slips through</li>
                            <li>Actually have time to work</li>
                        </ul>
                    </div>
                </div>

                <div class="cta-box">
                    <h3>Let's Fix This</h3>
                    <p>A 30-minute audit ($200) shows you exactly what's broken and what a working system looks like.</p>
                    <div class="email-input-group">
                        <input type="email" value="${email}" disabled style="background: #FAF7F9; color: #5A4F58;">
                        <button class="btn-primary" onclick="bookAudit('${email}')">Book Audit Now</button>
                    </div>
                    <p style="font-size: 12px; opacity: 0.8;">You'll see my calendar in a new tab</p>
                </div>
            `;

            window.scrollTo(0, 0);
        }

            function bookAudit(email) {
            window.location.href = 'https://calendar.app.google/jJ8PUp2sWyxwdFBx8';
            }
    </script>
</body>
</html>
