<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Cost Calculator</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    background:#2C0D28;
    padding:20px;
}

.container {
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:8px;
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

button {
    padding:12px;
    width:100%;
    background:#4A1942;
    color:#fff;
    border:none;
    cursor:pointer;
}

.hidden { display:none; }

.cta-box {
    margin-top:30px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div id="formSection">
    <h2>Admin Cost Calculator</h2>

    <select id="role">
        <option value="">Select role</option>
        <option value="coach">Coach</option>
        <option value="trainer">Trainer</option>
        <option value="freelancer">Freelancer</option>
        <option value="ecom">Ecom</option>
    </select>

    <input type="number" id="adminHours" placeholder="Admin hours/week">
    <input type="number" id="hourlyRate" placeholder="Hourly rate">
    <input type="number" id="leadsPerMonth" placeholder="Leads per month">
    <input type="number" id="conversionRate" placeholder="Conversion rate %">
    <input type="number" id="avgValue" placeholder="Average deal value">
    <input type="email" id="email" placeholder="Your email">

    <button id="calculateBtn">Calculate My Cost</button>
</div>

<div id="resultSection" class="hidden">
    <div id="resultContent"></div>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const btn = document.getElementById("calculateBtn");

    btn.addEventListener("click", calculateCost);

    function calculateCost() {

        const role = document.getElementById('role').value;
        const adminHours = parseFloat(document.getElementById('adminHours').value);
        const hourlyRate = parseFloat(document.getElementById('hourlyRate').value);
        const leadsPerMonth = parseFloat(document.getElementById('leadsPerMonth').value);
        const conversionRate = parseFloat(document.getElementById('conversionRate').value);
        const avgValue = parseFloat(document.getElementById('avgValue').value);
        const email = document.getElementById('email').value;

        if (!role || !adminHours || !hourlyRate || !leadsPerMonth || !conversionRate || !avgValue || !email) {
            alert("Please fill all fields");
            return;
        }

        const annualAdminCost = adminHours * 52 * hourlyRate;
        const leadsPerYear = leadsPerMonth * 12;
        const expectedConversions = leadsPerYear * (conversionRate / 100);

        const lostDeals = Math.floor(expectedConversions * 0.2);
        const lostRevenue = lostDeals * avgValue;

        const totalCost = annualAdminCost + lostRevenue;

        // ✅ SEND TO FORMSPREE
        const formData = new FormData();
        formData.append("email", email);
        formData.append("role", role);
        formData.append("adminHours", adminHours);
        formData.append("hourlyRate", hourlyRate);
        formData.append("leadsPerMonth", leadsPerMonth);
        formData.append("conversionRate", conversionRate);
        formData.append("avgValue", avgValue);
        formData.append("annualAdminCost", annualAdminCost);
        formData.append("lostRevenue", lostRevenue);
        formData.append("totalCost", totalCost);

        fetch("https://formspree.io/f/mlgzrqrv", {
            method: "POST",
            body: formData,
            headers: { "Accept": "application/json" }
        })
        .then(res => {
            if (!res.ok) {
                console.error("Formspree failed");
            }
        })
        .catch(err => console.error(err));

        showResults(email, annualAdminCost, lostDeals, lostRevenue, totalCost);
    }

    function showResults(email, adminCost, lostDeals, lostRevenue, totalCost) {

        document.getElementById("formSection").classList.add("hidden");
        document.getElementById("resultSection").classList.remove("hidden");

        document.getElementById("resultContent").innerHTML = `
            <h2>Your Results</h2>

            <p>Admin Cost: <strong>$${adminCost.toLocaleString()}</strong></p>
            <p>Lost Deals: <strong>${lostDeals}</strong></p>
            <p>Lost Revenue: <strong>$${lostRevenue.toLocaleString()}</strong></p>
            <p>Total Cost: <strong>$${totalCost.toLocaleString()}</strong></p>

            <div class="cta-box">
                <h3>Fix This Now</h3>

                <!-- ✅ RELIABLE BUTTON -->
                <a href="https://calendar.app.google/jJ8PUp2sWyxwdFBx8" 
                   target="_blank"
                   style="display:inline-block; padding:12px 20px; background:#4A1942; color:#fff; text-decoration:none;">
                   👉 Book Audit Now
                </a>

                <p style="margin-top:10px;">Opens your calendar</p>
            </div>
        `;
    }

});
</script>

</body>
</html>
