<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Cost Calculator - See What You're Losing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #2C0D28;
            color: #1E0E1C;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #F9F0F7;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: -8px 8px #1A081A;
        }

        .header {
            background: #2C0D28;
            border-top: 8px solid #EDD9E8;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            color: #F9F0F7;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .header p {
            color: #EDD9E8;
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .content {
            padding: 40px 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: #2C0D28;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #1E0E1C;
            margin-bottom: 8px;
            font-size: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E8E2E7;
            border-radius: 6px;
            font-family: inherit;
            font-size: 15px;
            color: #1E0E1C;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6B2E60;
            background: #FAF7F9;
        }

        .input-with-unit {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-with-unit input {
            flex: 1;
        }

        .unit {
            font-weight: 600;
            color: #5A4F58;
            padding-bottom: 12px;
        }

        .hidden {
            display: none;
        }

        .form-container {
            background: #FAF7F9;
            padding: 30px;
            border-radius: 6px;
            border-left: 4px solid #6B2E60;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4A1942;
            color: #F9F0F7;
        }

        .btn-primary:hover {
            background: #2C0D28;
        }

        .btn-secondary {
            background: #E8E2E7;
            color: #1E0E1C;
        }

        .btn-secondary:hover {
            background: #D4C4CF;
        }

        .result {
            background: #FAF7F9;
            padding: 40px;
            border-radius: 6px;
            border-left: 4px solid #C4603A;
        }

        .result h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: #2C0D28;
            margin-bottom: 30px;
        }

        .cost-card {
            background: #2C0D28;
            color: #F9F0F7;
            padding: 25px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-top: 6px solid #EDD9E8;
        }

        .cost-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .cost-amount {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            color: #EDD9E8;
            margin-bottom: 5px;
        }

        .cost-description {
            font-size: 13px;
            opacity: 0.8;
        }

        .total-cost {
            background: #C4603A;
            color: #F9F0F7;
            padding: 30px;
            border-radius: 6px;
            margin: 30px 0;
            text-align: center;
        }

        .total-cost h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            opacity: 0.95;
        }

        .total-amount {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .total-subtext {
            font-size: 14px;
            opacity: 0.9;
        }

        .insights {
            background: #EDD9E8;
            padding: 25px;
            border-radius: 6px;
            margin: 30px 0;
        }

        .insights h3 {
            font-weight: 700;
            color: #2C0D28;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .insight-item {
            margin-bottom: 12px;
            color: #1E0E1C;
            font-size: 15px;
            line-height: 1.6;
        }

        .insight-item:last-child {
            margin-bottom: 0;
        }

        .cta-box {
            background: #2C0D28;
            color: #F9F0F7;
            padding: 30px;
            border-radius: 6px;
            text-align: center;
            margin-top: 30px;
        }

        .cta-box h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .cta-box p {
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
        }

        .email-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .email-input-group input {
            flex: 1;
            background: #F9F0F7;
            color: #1E0E1C;
        }

        .email-input-group button {
            flex: 0 0 150px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6B2E60;
        }

        .spinner {
            border: 3px solid #EDD9E8;
            border-top: 3px solid #4A1942;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .comparison-item {
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #6B2E60;
        }

        .comparison-item h4 {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .comparison-item ul {
            list-style: none;
            margin-left: 0;
        }

        .comparison-item li {
            padding: 5px 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .comparison-item li:before {
            content: "→ ";
            font-weight: 600;
            color: #6B2E60;
        }

        .result-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .result-actions button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>What's Your Admin Actually Costing You?</h1>
            <p>Find out how much revenue you're bleeding to broken systems.</p>
        </div>

        <div class="content">
            <div class="section" id="formSection">
                <div class="form-container">
                    <div class="form-group">
                        <label for="role">What's your role?</label>
                        <select id="role" onchange="updatePlaceholder()">
                            <option value="">Select your role...</option>
                            <option value="coach">Coach or Consultant</option>
                            <option value="trainer">Trainer or Fitness Professional</option>
                            <option value="freelancer">Freelancer or Agency Owner</option>
                            <option value="ecom">E-Commerce or Product Creator</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="adminHours">How many hours per week do you spend on admin?</label>
                        <div class="input-with-unit">
                            <input type="number" id="adminHours" placeholder="e.g., 15" min="0">
                            <div class="unit">hrs/week</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="hourlyRate">What's your hourly rate (coaching, project rate, or revenue per hour)?</label>
                        <div class="input-with-unit">
                            <input type="number" id="hourlyRate" placeholder="e.g., 150" min="0">
                            <div class="unit">$/hr</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="leadsPerMonth">How many leads/prospects do you work with per month?</label>
                        <div class="input-with-unit">
                            <input type="number" id="leadsPerMonth" placeholder="e.g., 10" min="0">
                            <div class="unit">leads</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="conversionRate">Roughly what % of your leads actually convert to clients?</label>
                        <div class="input-with-unit">
                            <input type="number" id="conversionRate" placeholder="e.g., 30" min="0" max="100">
                            <div class="unit">%</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="avgValue">What's the average value per client/project?</label>
                        <div class="input-with-unit">
                            <input type="number" id="avgValue" placeholder="e.g., 1500" min="0">
                            <div class="unit">$</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email (to get your detailed breakdown)</label>
                        <input type="email" id="email" placeholder="you@email.com">
                    </div>

                    <div class="button-group">
                        <button class="btn-primary" onclick="calculateCost()">Calculate My Cost</button>
                    </div>
                </div>
            </div>

            <div class="section hidden" id="resultSection">
                <div class="result">
                    <h2>Here's What Your Systems Are Actually Costing You</h2>
                    
                    <div id="resultContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updatePlaceholder() {
            const role = document.getElementById('role').value;
            const avgValueInput = document.getElementById('avgValue');
            
            const placeholders = {
                coach: '2000',
                trainer: '1500',
                freelancer: '3000',
                ecom: '100'
            };
            
            avgValueInput.placeholder = 'e.g., ' + (placeholders[role] || '1500');
        }

        function calculateCost() {
            const role = document.getElementById('role').value;
            const adminHours = parseFloat(document.getElementById('adminHours').value);
            const hourlyRate = parseFloat(document.getElementById('hourlyRate').value);
            const leadsPerMonth = parseFloat(document.getElementById('leadsPerMonth').value);
            const conversionRate = parseFloat(document.getElementById('conversionRate').value);
            const avgValue = parseFloat(document.getElementById('avgValue').value);
            const email = document.getElementById('email').value;

            if (!role || !adminHours || !hourlyRate || !leadsPerMonth || !conversionRate || !avgValue || !email) {
                alert('Please fill in all fields');
                return;
            }

            // Calculate costs
            const annualAdminCost = adminHours * 52 * hourlyRate;
            const leadsPerYear = leadsPerMonth * 12;
            const expectedConversions = leadsPerYear * (conversionRate / 100);
            const potentialRevenue = leadsPerYear * (avgValue / 100);
            
            // Estimate lost conversions (assume 15-25% slip due to poor follow-up)
            const slipRate = 0.20;
            const lostDealsFromSlip = Math.floor(expectedConversions * slipRate);
            const lostRevenueFromSlip = lostDealsFromSlip * avgValue;
            
            const totalAnnualCost = annualAdminCost + lostRevenueFromSlip;

            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = `
                <div class="cost-card">
                    <h3>Time Spent on Admin</h3>
                    <div class="cost-amount">$${annualAdminCost.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="cost-description">${adminHours} hours/week × 52 weeks × $${hourlyRate}/hour</div>
                </div>

                <div class="cost-card">
                    <h3>Revenue Lost to Poor Follow-Up</h3>
                    <div class="cost-amount">$${lostRevenueFromSlip.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="cost-description">~${lostDealsFromSlip} deals slip per year due to no system</div>
                </div>

                <div class="total-cost">
                    <h3>Total Annual Cost</h3>
                    <div class="total-amount">$${totalAnnualCost.toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    <div class="total-subtext">That's ${(totalAnnualCost / 12).toLocaleString('en-US', {maximumFractionDigits: 0})} per month bleeding to chaos</div>
                </div>

                <div class="insights">
                    <h3>What This Means</h3>
                    <div class="insight-item">
                        <strong>Time-wise:</strong> You're spending ${adminHours * 52} hours per year on things that don't generate revenue. That's ${adminHours > 20 ? 'more than a full-time job' : 'months of your life'} on admin.
                    </div>
                    <div class="insight-item">
                        <strong>Revenue-wise:</strong> You're losing ~${lostDealsFromSlip} deals per year because leads go cold without a follow-up system. At $${avgValue} per deal, that's real money walking out the door.
                    </div>
                    <div class="insight-item">
                        <strong>The compounding effect:</strong> When admin eats your time, you have less time to sell. When you sell less, you make less. When you make less, you're even more stressed. It feeds on itself.
                    </div>
                </div>

                <div class="comparison">
                    <div class="comparison-item">
                        <h4>What You're Doing Now</h4>
                        <ul>
                            <li>Tracking clients across multiple tools</li>
                            <li>Remembering who to follow up with</li>
                            <li>Resending the same information</li>
                            <li>Losing leads because you forgot</li>
                            <li>${adminHours} hours/week on admin</li>
                        </ul>
                    </div>
                    <div class="comparison-item">
                        <h4>With A Working System</h4>
                        <ul>
                            <li>Everything in one place</li>
                            <li>Automatic follow-up reminders</li>
                            <li>Templated communication</li>
                            <li>Nothing slips through cracks</li>
                            <li>2-3 hours/week on admin</li>
                        </ul>
                    </div>
                </div>

                <div class="cta-box">
                    <h3>What A Working System Actually Costs</h3>
                    <p>A 30-minute audit ($200) to see exactly where your system is broken and what a fix looks like.</p>
                    <p style="font-size: 14px; opacity: 0.9;">Most people find it's worth 100x the cost because they finally see the gap.</p>
                    <div class="email-input-group">
                        <input type="email" id="bookingEmail" placeholder="Your email" value="${email}">
                        <button class="btn-primary" onclick="requestAudit('${email}')">Book Audit ($200)</button>
                    </div>
                    <p style="font-size: 12px; opacity: 0.8;">Calendar link in your email within 24 hours.</p>
                </div>
            `;

            window.scrollTo(0, 0);
        }

        function requestAudit(email) {
            if (!email) {
                alert('Please enter your email');
                return;
            }
            alert(`Thanks! Check your email at ${email}. Calendar link coming within 24 hours.`);
            console.log('Audit request:', {
                email: email,
                timestamp: new Date().toISOString()
            });
        }
    </script>
</body>
</html>
